name: gamibook

services:
  # 1. Ollama — Modelos de Embeddings
  ollama:
    image: ollama/ollama
    container_name: gamibook-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./docker/ollama_data:/root/.ollama
    restart: unless-stopped

  # 2. Serviço de Inteligência Artificial
  flowise:
    image: flowiseai/flowise:2.2.4
    container_name: gamibook-flowise
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLOWISE_USERNAME=${FLOWISE_USERNAME}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    volumes:
      - ./docker/flowise_data:/root/.flowise
    restart: unless-stopped

  # 2. Serviço de Backend e Gestão de Conteúdos
  directus:
    image: directus/directus:latest
    container_name: gamibook-directus
    ports:
      - "8055:8055"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
      - ./directus/templates:/directus/templates
    env_file:
      - .env
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "mysql"
      DB_HOST: "host.docker.internal"
      DB_PORT: "3306"
      DB_DATABASE: "gamibook"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS,PUT"
      CORS_HEADERS: "Content-Type,Authorization"
      CORS_CREDENTIALS: "true"

      ACCESS_TOKEN_TTL: "30m"
      REFRESH_TOKEN_TTL: "30d"

      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE}
      PASSWORD_RESET_URL_ALLOW_LIST: ${PASSWORD_RESET_URL_ALLOW_LIST}
    restart: unless-stopped