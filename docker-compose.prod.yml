name: gamibook-prod

services:
  # 1. Database — MySQL for Directus
  database:
    image: mysql:8.0
    container_name: gamibook-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-gamibook_root_pass}
      MYSQL_DATABASE: gamibook
      MYSQL_USER: ${DB_USER:-gamibook_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gamibook_pass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gamibook-network
    # 2. Ollama — Local LLM/Embedding models
    # ollama:
    # image: ollama/ollama:latest
    #  container_name: gamibook-ollama
    #  restart: unless-stopped
    #  ports:
    #    - "11434:11434"
    #  volumes:
    #    - ./docker/ollama_data:/root/.ollama
    #  networks:
    #    - gamibook-network
    # Production note: Enable GPU support if running on a host with an NVIDIA GPU.
    # To enable GPU, uncomment the following block:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # 3. Flowise — AI Workflow / Chatflow UI
  flowise:
    image: flowiseai/flowise:2.2.4
    container_name: gamibook-flowise
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - FLOWISE_USERNAME=${FLOWISE_USERNAME}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
    volumes:
      - ./docker/flowise_data:/root/.flowise
    # depends_on:
    #   - ollama
    networks:
      - gamibook-network

  # 4. Directus — Headless CMS & Backend
  directus:
    image: ghcr.io/edisousa5/gamibook-directus:latest
    container_name: gamibook-directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Note: We do not bind-mount './directus/extensions' in production because the 
      # Dockerfile builds and bakes the extensions into the image at build-time.
      - ./directus/uploads:/directus/uploads
      - ./directus/templates:/directus/templates
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
      BASE_URL: ${BASE_URL}
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "mysql"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "gamibook"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      CORS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:8080,http://localhost:5173}
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS,PUT"
      CORS_HEADERS: "Content-Type,Authorization"
      CORS_CREDENTIALS: "true"

      ACCESS_TOKEN_TTL: "30m"
      REFRESH_TOKEN_TTL: "30d"

      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE}
      PASSWORD_RESET_URL_ALLOW_LIST: ${PASSWORD_RESET_URL_ALLOW_LIST}
    networks:
      - gamibook-network

  # 5. Client — Vue 3 SPA frontend served via Nginx
  client:
    image: ghcr.io/edisousa5/gamibook-client:latest
    container_name: gamibook-client
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      VITE_DIRECTUS_URL: ${VITE_DIRECTUS_URL:-http://localhost:8055}
      VITE_FLOWISE_URL: ${VITE_FLOWISE_URL:-http://localhost:3000}
      VITE_FLOWISE_CHATFLOW_ID: ${VITE_FLOWISE_CHATFLOW_ID}
      VITE_FLOWISE_API_KEY: ${VITE_FLOWISE_API_KEY}
    depends_on:
      - directus
      - flowise
    networks:
      - gamibook-network

networks:
  gamibook-network:
    driver: bridge

volumes:
  db_data:
